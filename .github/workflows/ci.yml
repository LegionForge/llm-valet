name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# dev-rig SHA — bump this intentionally when upgrading shared workflows.
# Pinned so accidental changes in dev-rig never silently affect this repo.
# Current: 8a10629 feat(audit): add ignore-vulns input to suppress specific CVEs

jobs:
  lint:
    uses: LegionForge/dev-rig/.github/workflows/lint.yml@8a10629
    with:
      source-dirs: "llm_valet svcmgr"

  test:
    uses: LegionForge/dev-rig/.github/workflows/test.yml@8a10629
    with:
      coverage-source: "llm_valet"
      coverage-threshold: 80

  sast:
    uses: LegionForge/dev-rig/.github/workflows/sast.yml@8a10629
    with:
      source-dirs: "llm_valet/"
    permissions:
      security-events: write

  audit:
    uses: LegionForge/dev-rig/.github/workflows/audit.yml@8a10629
    with:
      # CVE-2026-3219 affects pip itself (the runner tool), not a runtime dep of llm-valet.
      # Remove once pip ships a fix.
      ignore-vulns: "CVE-2026-3219"

  secrets:
    uses: LegionForge/dev-rig/.github/workflows/secrets.yml@8a10629
    permissions:
      contents: read

  sbom:
    uses: LegionForge/dev-rig/.github/workflows/sbom.yml@8a10629
