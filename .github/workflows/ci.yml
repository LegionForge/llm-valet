name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    uses: LegionForge/dev-rig/.github/workflows/lint.yml@main
    with:
      source-dirs: "llm_valet svcmgr"

  test:
    uses: LegionForge/dev-rig/.github/workflows/test.yml@main
    with:
      coverage-source: "llm_valet"
      coverage-threshold: 80

  sast:
    uses: LegionForge/dev-rig/.github/workflows/sast.yml@main
    with:
      source-dirs: "llm_valet/"
    permissions:
      security-events: write

  audit:
    uses: LegionForge/dev-rig/.github/workflows/audit.yml@main
    with:
      # CVE-2026-3219 affects pip itself (the runner tool), not a runtime dep of llm-valet.
      # Remove once pip ships a fix.
      ignore-vulns: "CVE-2026-3219"

  secrets:
    uses: LegionForge/dev-rig/.github/workflows/secrets.yml@main
    permissions:
      contents: read

  sbom:
    uses: LegionForge/dev-rig/.github/workflows/sbom.yml@main
