name: Publish to PyPI

# Triggered by pushing a version tag (e.g. git tag v0.6.0 && git push --tags).
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in secrets.
# Configure the trusted publisher at https://pypi.org/manage/project/llm-valet/settings/
# before pushing the first tag:
#   Publisher: GitHub Actions
#   Repository: LegionForge/llm-valet
#   Workflow: publish.yml
#   Environment: pypi

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install hatchling build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
