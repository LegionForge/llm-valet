<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>llm-valet</title>
<style>
  /* ── Themes ─────────────────────────────────────────────────────────────── */
  :root {
    --bg:      #0e0e0e;
    --surface: #1a1a1a;
    --border:  #2e2e2e;
    --text:    #e8e8e8;
    --dim:     #888;
    --accent:  #4a9eff;
    --green:   #4caf7d;
    --yellow:  #e8a838;
    --red:     #e05050;
    --bar-bg:  #2a2a2a;
  }
  :root[data-theme="light"] {
    --bg:      #f4f4f4;
    --surface: #ffffff;
    --border:  #d0d0d0;
    --text:    #1a1a1a;
    --dim:     #666;
    --accent:  #1a6fd4;
    --green:   #2e7d52;
    --yellow:  #b07800;
    --red:     #c0392b;
    --bar-bg:  #e0e0e0;
  }

  /* ── Base ────────────────────────────────────────────────────────────────── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", ui-monospace,
                 "Courier New", monospace;
    font-size: 13px;
    line-height: 1.55;
    max-width: 660px;
    margin: 0 auto;
    padding: 32px 20px 48px;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ── Header ──────────────────────────────────────────────────────────────── */
  .header-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.04em; }
  .header-actions { display: flex; gap: 10px; align-items: center; margin-top: 2px; }
  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    width: 26px;
    height: 26px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, color 0.15s;
    padding: 0;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

  .subtitle {
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 10px;
  }
  .security-badge {
    display: none;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 2px 8px;
    border-radius: 2px;
    margin-bottom: 18px;
  }
  .security-badge.safe { color: var(--dim);   border: 1px solid var(--border); }
  .security-badge.ok   { color: var(--green);  border: 1px solid var(--green);  }
  .security-badge.warn { color: var(--red);    border: 1px solid var(--red);    }
  .security-badge a { color: inherit; text-decoration: none; opacity: 0.8; margin-left: 4px; }
  .security-badge a:hover { text-decoration: underline; opacity: 1; }

  .overcommit-warn {
    display: none;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 3px;
    margin-bottom: 8px;
    color: var(--yellow);
    border: 1px solid var(--yellow);
  }

  /* ── Section ─────────────────────────────────────────────────────────────── */
  section { margin-bottom: 0; }
  .section-title {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 10px;
  }
  hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* ── State badge ─────────────────────────────────────────────────────────── */
  .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 3px 9px;
    border-radius: 3px;
    border: 1px solid currentColor;
  }
  .badge.running  { color: var(--green);  }
  .badge.paused   { color: var(--yellow); }
  .badge.idle     { color: var(--dim);    }
  .badge.stopped  { color: var(--red);    }
  .model-name { font-size: 12px; color: var(--dim); }

  .last-action { font-size: 11px; color: var(--dim); min-height: 16px; margin-top: 4px; }

  /* ── Resource bars ───────────────────────────────────────────────────────── */
  .metric { margin-bottom: 12px; }
  .metric-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 4px;
  }
  .metric-label .value { color: var(--text); }
  .bar-track {
    position: relative;
    background: var(--bar-bg);
    border-radius: 2px;
    height: 8px;
    overflow: visible;
    display: flex;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width 0.4s ease;
  }
  .bar-fill.warn     { background: var(--yellow); }
  .bar-fill.critical { background: var(--red); }
  /* RAM breakdown segments */
  .bar-seg-model  { background: var(--accent);  height: 100%; transition: width 0.4s ease; }
  .bar-seg-other  { background: var(--dim);      height: 100%; opacity: 0.5; transition: width 0.4s ease; }
  .bar-seg-model:first-child  { border-radius: 2px 0 0 2px; }
  .bar-seg-other:last-of-type { border-radius: 0 2px 2px 0; }
  .bar-legend {
    display: flex; gap: 12px; font-size: 10px; color: var(--dim);
    margin-top: 3px;
  }
  .bar-legend span { display: flex; align-items: center; gap: 4px; }
  .bar-legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-model { background: var(--accent); }
  .dot-other { background: var(--dim); opacity: 0.7; }
  .threshold-marker {
    position: absolute;
    top: -3px;
    width: 2px;
    height: 14px;
    background: var(--red);
    opacity: 0.7;
    border-radius: 1px;
  }

  /* ── Buttons ─────────────────────────────────────────────────────────────── */
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  button {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 18px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button:active { opacity: 0.7; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button.danger:hover { border-color: var(--red); color: var(--red); }

  /* ── Sliders ─────────────────────────────────────────────────────────────── */
  .slider-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; }
  .slider-item label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--dim); margin-bottom: 5px;
  }
  .slider-item label span { color: var(--text); }
  input[type=range] {
    width: 100%;
    accent-color: var(--accent);
    cursor: pointer;
  }

  /* ── Error banner ────────────────────────────────────────────────────────── */
  #error-banner {
    display: none;
    background: #2a1a1a;
    border: 1px solid var(--red);
    color: var(--red);
    font-size: 11px;
    padding: 8px 12px;
    border-radius: 3px;
    margin-bottom: 16px;
  }
  :root[data-theme="light"] #error-banner { background: #fdecea; }

  /* ── API key prompt ──────────────────────────────────────────────────────── */
  #key-prompt {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px;
    border-radius: 3px;
    margin-bottom: 16px;
  }
  #key-prompt .section-title { margin-bottom: 8px; }
  #key-prompt .key-row { display: flex; gap: 8px; align-items: center; }
  #key-input {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 12px;
  }
  #key-input:focus { outline: none; border-color: var(--accent); }

  /* ── Provider section ────────────────────────────────────────────────────── */
  .provider-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .provider-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 1px 6px;
    border-radius: 2px;
  }
  .provider-endpoint { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--dim); margin-bottom: 8px; }
  #pv-endpoint { color: var(--text); font-family: monospace; }
  .pv-status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .pv-status-dot.up   { background: var(--green); }
  .pv-status-dot.down { background: var(--red); }
  #pv-status-text.up   { color: var(--green); }
  #pv-status-text.down { color: var(--red); }
  .provider-stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 6px; }
  .provider-stat { font-size: 12px; color: var(--dim); }
  .provider-stat span { color: var(--text); }
  .layer-ratio { font-size: 11px; color: var(--dim); margin-bottom: 10px; min-height: 15px; }
  .model-select-row { display: flex; gap: 8px; align-items: center; }
  select {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 12px;
  }
  select:focus { outline: none; border-color: var(--accent); }

  /* ── Model management panel ──────────────────────────────────────────────── */
  .collapsible-header {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    margin-bottom: 0;
  }
  .collapsible-header .arrow {
    font-size: 9px;
    color: var(--dim);
    transition: transform 0.2s;
    display: inline-block;
  }
  .collapsible-header.open .arrow { transform: rotate(90deg); }
  .collapsible-body {
    display: none;
    margin-top: 12px;
  }
  .collapsible-body.open { display: block; }

  .model-list { margin-bottom: 12px; }
  .model-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .model-row:last-child { border-bottom: none; }
  .model-row .model-info { color: var(--dim); font-size: 11px; }
  .btn-sm {
    background: var(--surface);
    color: var(--dim);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-sm:hover { border-color: var(--red); color: var(--red); }
  .pull-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  #pull-input {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 12px;
  }
  #pull-input:focus { outline: none; border-color: var(--accent); }
  #pull-status { font-size: 11px; color: var(--dim); margin-top: 6px; min-height: 15px; }

  /* ── Context window selector ─────────────────────────────────────────────── */
  .ctx-select-row {
    display: none;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    font-size: 11px;
    color: var(--dim);
  }
  .ctx-select-row label { white-space: nowrap; flex-shrink: 0; }

  /* ── Separator ───────────────────────────────────────────────────────────── */
  .load-status { font-size: 11px; color: var(--dim); margin-top: 6px; min-height: 15px; }
</style>
</head>
<body>

<!-- Header -->
<div class="header-row">
  <h1>llm-valet</h1>
  <div class="header-actions">
    <span id="version-badge" style="font-size:10px;color:var(--dim);align-self:center;letter-spacing:0.04em"></span>
    <button class="icon-btn" title="Fetch latest status immediately without waiting for the next auto-refresh" aria-label="Refresh now" onclick="poll()">↺</button>
    <button class="icon-btn" id="theme-btn" title="Toggle between dark and light display mode" aria-label="Toggle light/dark mode" onclick="toggleTheme()">◑</button>
    <a href="https://github.com/LegionForge/llm-valet#readme" target="_blank" rel="noopener">
      <button class="icon-btn" title="Open the llm-valet README and documentation on GitHub" aria-label="Help / README">?</button>
    </a>
  </div>
</div>
<p class="subtitle">
  LLM lifecycle manager ·
  <a href="https://legionforge.org" target="_blank" rel="noopener">by LegionForge</a>
</p>
<div id="security-badge" class="security-badge"></div>

<div id="error-banner"></div>

<!-- API key prompt (shown on 401) -->
<div id="key-prompt">
  <div class="section-title">API Key Required</div>
  <div class="key-row">
    <input type="password" id="key-input" placeholder="Enter X-API-Key" autocomplete="off">
    <button onclick="submitKey()">CONNECT</button>
  </div>
</div>

<!-- State -->
<section>
  <div class="section-title">State</div>
  <div class="status-row">
    <span class="badge" id="state-badge">--</span>
    <span class="model-name" id="model-name"></span>
  </div>
  <div class="last-action" id="last-action"></div>
</section>

<hr>

<!-- Provider -->
<section>
  <div class="provider-header">
    <div class="section-title" style="margin-bottom:0">Provider</div>
    <span class="provider-badge" id="provider-badge">OLLAMA</span>
  </div>
  <div class="provider-endpoint" id="pv-endpoint-row">
    <span id="pv-endpoint">—</span>
    <span class="pv-status-dot" id="pv-status-dot"></span>
    <span id="pv-status-text">—</span>
  </div>
  <div class="provider-stats">
    <div class="provider-stat">Loaded: <span id="pv-model">—</span></div>
    <div class="provider-stat">Memory: <span id="pv-mem">—</span></div>
    <div class="provider-stat">Context: <span id="pv-ctx">—</span></div>
  </div>
  <div class="layer-ratio" id="layer-ratio"></div>
  <div class="overcommit-warn" id="overcommit-warn" role="alert" aria-live="polite"></div>
  <div class="model-select-row">
    <select id="model-select"
            title="Choose a model to load into memory. Only models already downloaded to this machine are listed. Use Model Management below to pull new ones."
            aria-label="Select model to load"
            onchange="onModelSelectChange()">
      <option value="">— select model —</option>
    </select>
    <button id="btn-load" onclick="loadModel()"
            title="Load the selected model into memory so it can serve requests. RAM usage will increase. The model stays loaded until you PAUSE or STOP."
            aria-label="Load selected model">LOAD</button>
  </div>
  <div class="ctx-select-row" id="ctx-select-row">
    <label for="ctx-select">Context window</label>
    <select id="ctx-select"
            title="Override how many tokens fit in the model's context window. 'Model default' uses Ollama's built-in value (usually the model's trained maximum). Smaller values use less RAM; larger values allow longer conversations but increase memory usage."
            aria-label="Context window size override"
            onchange="updateLoadButton()">
      <option value="">Model default</option>
    </select>
  </div>
  <div class="load-status" id="load-status"></div>
</section>

<hr>

<!-- Resources -->
<section id="resources-section">
  <div class="section-title">Resources</div>

  <div class="metric" id="ram-metric">
    <div class="metric-label">
      <span>RAM</span>
      <span class="value" id="ram-value">-- %</span>
    </div>
    <div class="bar-track" id="ram-bar-track">
      <div class="bar-fill" id="ram-bar" style="width:0%"></div>
      <div class="threshold-marker" id="ram-threshold-marker" style="left:85%"></div>
    </div>
    <div class="bar-legend" id="ram-legend" style="display:none">
      <span><i class="dot dot-model"></i>model</span>
      <span><i class="dot dot-other"></i>other</span>
      <span id="ram-legend-pct" style="margin-left:auto"></span>
    </div>
  </div>

  <div class="metric">
    <div class="metric-label">
      <span>CPU</span>
      <span class="value" id="cpu-value">-- %</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="cpu-bar" style="width:0%"></div>
      <div class="threshold-marker" id="cpu-threshold-marker" style="left:90%"></div>
    </div>
  </div>

  <div class="metric" id="gpu-metric" style="display:none">
    <div class="metric-label">
      <span>GPU VRAM</span>
      <span class="value" id="gpu-value">-- %</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="gpu-bar" style="width:0%"></div>
      <div class="threshold-marker" id="gpu-threshold-marker" style="left:85%"></div>
    </div>
  </div>
</section>

<hr>

<!-- Controls -->
<section>
  <div class="section-title">Controls</div>
  <div class="btn-row">
    <button id="btn-pause"   onclick="action('pause')"
            title="Unload model from memory. LLM Provider stays running. Use RESUME to reload.">PAUSE</button>
    <button id="btn-resume"  onclick="action('resume')"
            title="Reload the last model into memory.">RESUME</button>
    <button id="btn-start"   onclick="action('start')"
            title="Start the LLM Provider service. No model is loaded automatically — use LOAD or RESUME after.">START SVC</button>
    <button id="btn-stop"    class="danger" onclick="action('stop')"
            title="Unload model, then shut down the LLM Provider service.">STOP</button>
    <button id="btn-restart" onclick="action('restart')"
            title="Restart the LLM Provider service. Does not reload model — use LOAD or RESUME after.">RESTART SVC</button>
  </div>
</section>

<hr>

<!-- Thresholds + Refresh Rate -->
<section>
  <div class="section-title">Thresholds</div>
  <div class="slider-grid">
    <div class="slider-item">
      <label>RAM pause <span id="lbl-ram-pause">85%</span></label>
      <input type="range" id="sl-ram-pause" min="50" max="98" value="85"
             title="Watchdog pauses the model when RAM exceeds this percentage. Set this above your model's loaded RAM footprint to avoid oscillation (e.g. 8 GB model on 16 GB = ~50% — set pause above 55%)."
             aria-label="RAM pause threshold percentage"
             oninput="updateLabel('lbl-ram-pause', this.value, '%')"
             onchange="saveThresholds()">
    </div>
    <div class="slider-item">
      <label>RAM resume <span id="lbl-ram-resume">60%</span></label>
      <input type="range" id="sl-ram-resume" min="30" max="90" value="60"
             title="Watchdog resumes the model only after RAM drops below this percentage. Keep a gap between pause and resume thresholds to prevent the model from rapidly pausing and resuming."
             aria-label="RAM resume threshold percentage"
             oninput="updateLabel('lbl-ram-resume', this.value, '%')"
             onchange="saveThresholds()">
    </div>
    <div class="slider-item">
      <label>CPU pause <span id="lbl-cpu-pause">90%</span></label>
      <input type="range" id="sl-cpu-pause" min="50" max="99" value="90"
             title="Watchdog pauses the model when CPU usage stays above this percentage for a sustained period. Helps free CPU during intensive tasks like gaming or video encoding."
             aria-label="CPU pause threshold percentage"
             oninput="updateLabel('lbl-cpu-pause', this.value, '%')"
             onchange="saveThresholds()">
    </div>
    <div class="slider-item">
      <label>GPU VRAM pause <span id="lbl-gpu-pause">85%</span></label>
      <input type="range" id="sl-gpu-pause" min="50" max="98" value="85"
             title="Watchdog pauses the model when GPU VRAM exceeds this percentage. Useful when running GPU-intensive apps like games alongside the LLM. Not applicable on Apple Silicon (unified memory)."
             aria-label="GPU VRAM pause threshold percentage"
             oninput="updateLabel('lbl-gpu-pause', this.value, '%')"
             onchange="saveThresholds()">
    </div>
    <div class="slider-item">
      <label>Refresh rate <span id="lbl-refresh">5s</span></label>
      <input type="range" id="sl-refresh" min="5" max="60" value="5"
             title="How often the dashboard polls for updated status. Lower = more responsive display, slightly more network traffic. Higher = less frequent updates. Stored in your browser, not on the server."
             aria-label="Dashboard refresh rate in seconds"
             oninput="updateLabel('lbl-refresh', this.value, 's')"
             onchange="applyRefreshRate()">
    </div>
  </div>
  <div style="margin-top:14px;font-size:12px;display:flex;align-items:center;gap:8px">
    <input type="checkbox" id="cb-auto-resume" checked onchange="saveThresholds()"
           title="When checked: watchdog automatically reloads the model after RAM pressure clears. Uncheck if your model fills most of your RAM — otherwise the model reloading is what causes the pressure, creating an infinite pause/resume loop."
           aria-label="Auto-resume model after RAM pressure clears"
           style="accent-color:var(--accent);cursor:pointer;width:14px;height:14px">
    <label for="cb-auto-resume" style="color:var(--dim);cursor:pointer">
      Auto-resume after RAM pressure clears
      <span style="color:var(--dim);font-size:10px">
        (uncheck to prevent oscillation when model fills RAM)
      </span>
    </label>
  </div>
</section>

<hr>

<!-- Model Management -->
<section>
  <div class="collapsible-header" id="mgmt-header" onclick="toggleMgmt()">
    <div class="section-title" style="margin-bottom:0">Model Management</div>
    <span class="arrow">▶</span>
  </div>
  <div class="collapsible-body" id="mgmt-body">
    <div class="model-list" id="mgmt-model-list">
      <div style="color:var(--dim);font-size:11px">Loading models…</div>
    </div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:6px">Pull model</div>
    <div class="pull-row">
      <input type="text" id="pull-input" placeholder="model:tag (e.g. llama3.2:3b)" autocomplete="off">
      <button onclick="pullModel()">PULL</button>
    </div>
    <div id="pull-status"></div>
  </div>
</section>

<script>
"use strict";

const API = "";  // same-origin
let _thresholds = { ram_pause_pct: 85, cpu_pause_pct: 90, gpu_vram_pause_pct: 85 };
let _polling = null;
let _modelMeta = {};   // name → { size_mb, context_length }
let _refreshMs = 5000;
let _lastProvider = null;   // last known provider state from poll
let _lastWatchdog = null;   // last known watchdog state from poll
let _pendingAction = null;  // "stopping"|"starting"|"restarting" while async op in flight
const _draggingSliders = new Set();  // slider IDs currently held by the user — skip sync while dragging
let _savingConfig = false;           // PUT to /config in flight — block poll sync until write completes
let _modelSelectDirty = false;       // user has chosen a model that hasn't been loaded yet — don't overwrite with server state

// ── Theme ─────────────────────────────────────────────────────────────────────

function initTheme() {
  const saved = localStorage.getItem("llm_valet_theme") || "dark";
  applyTheme(saved);
}

function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem("llm_valet_theme", theme);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute("data-theme") || "dark";
  applyTheme(current === "dark" ? "light" : "dark");
}

// ── API key management ────────────────────────────────────────────────────────

function getKey() {
  return sessionStorage.getItem("llm_valet_key") || "";
}

function setKey(k) {
  if (k) sessionStorage.setItem("llm_valet_key", k);
  else sessionStorage.removeItem("llm_valet_key");
}

function showKeyPrompt() {
  clearInterval(_polling);
  _polling = null;
  document.getElementById("key-prompt").style.display = "block";
  document.getElementById("key-input").focus();
}

function hideKeyPrompt() {
  document.getElementById("key-prompt").style.display = "none";
}

function submitKey() {
  const val = document.getElementById("key-input").value.trim();
  setKey(val);
  hideKeyPrompt();
  hideError();
  boot();
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && document.activeElement === document.getElementById("key-input")) {
    submitKey();
  }
});

// ── Fetch wrapper ─────────────────────────────────────────────────────────────

async function apiFetch(path, options) {
  const headers = Object.assign({}, (options && options.headers) || {});
  const key = getKey();
  if (key) headers["X-API-Key"] = key;
  const r = await fetch(API + path, Object.assign({}, options, { headers }));
  if (r.status === 401) {
    showKeyPrompt();
    throw new Error("HTTP 401 — API key required");
  }
  return r;
}

// ── Boot ──────────────────────────────────────────────────────────────────────

async function boot() {
  initRefreshRate();
  initSliderDragTracking();
  await loadConfig();
  await loadModels();
  await poll();
  _polling = setInterval(poll, _refreshMs);
}

// ── Refresh rate ──────────────────────────────────────────────────────────────

function initRefreshRate() {
  const saved = parseInt(localStorage.getItem("llm_valet_refresh") || "5", 10);
  const clamped = Math.max(5, Math.min(60, saved));
  _refreshMs = clamped * 1000;
  const sl = document.getElementById("sl-refresh");
  const lbl = document.getElementById("lbl-refresh");
  if (sl)  sl.value = clamped;
  if (lbl) lbl.textContent = clamped + "s";
}

function applyRefreshRate() {
  const val = parseInt(document.getElementById("sl-refresh").value, 10);
  _refreshMs = val * 1000;
  localStorage.setItem("llm_valet_refresh", String(val));
  clearInterval(_polling);
  _polling = setInterval(poll, _refreshMs);
}

// ── Polling ───────────────────────────────────────────────────────────────────

async function poll() {
  try {
    // Fetch status and config in parallel — config sync keeps sliders consistent
    // across multiple open browser tabs without requiring a manual page reload.
    const [r, cfgR] = await Promise.all([apiFetch("/status"), apiFetch("/config")]);
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    if (cfgR.ok) syncConfigSliders(await cfgR.json());
    hideError();

    // Capture before renderState() clears _pendingAction — used for model reload below
    const serviceJustStarted = (
      (_pendingAction === "starting" || _pendingAction === "restarting") &&
      data.provider.running
    );

    _lastProvider = data.provider;
    _lastWatchdog = data.watchdog;
    renderState(data.provider, data.watchdog);
    renderProvider(data.provider);
    renderMetrics(data.metrics);
    renderControls(data.provider, data.watchdog);
    if (data.version) {
      document.getElementById("version-badge").textContent = "v" + data.version;
    }
    if (data.security) renderSecurityBadge(data.security);

    // Reload model dropdown after START/RESTART — Ollama needs ~1.5s to index models
    // after the service comes up, so /models returns empty immediately after start.
    if (serviceJustStarted) {
      setTimeout(loadModels, 1500);
    }
  } catch (e) {
    if (!e.message.includes("401")) showError("Cannot reach llm-valet API — " + e.message);
  }
}

function renderSecurityBadge(sec) {
  const el = document.getElementById("security-badge");
  if (!el) return;

  let text, cls, tooltip, searchUrl;

  if (sec.lan_exposed && !sec.auth_enabled) {
    text      = "⚠ Visible on your local network — not secured";
    cls       = "security-badge warn";
    tooltip   = "Anyone on your local network can control your LLM service right now — no password or key is required. To fix this: open ~/.llm-valet/config.yaml, add a line that reads  api_key: your-secret-key  then restart llm-valet. Choose any strong passphrase you like.";
    searchUrl = "https://duckduckgo.com/?q=local+network+service+no+authentication+security+risk";
  } else if (sec.lan_exposed) {
    text      = "Visible on your local network — API key securing access";
    cls       = "security-badge ok";
    tooltip   = "llm-valet is reachable by other devices on your local network, and an API key is required for access. Your service is protected. This is expected if you set host: 0.0.0.0 in config.yaml.";
    searchUrl = "https://duckduckgo.com/?q=local+network+LAN+exposure+security+best+practices";
  } else {
    text      = "Local access only";
    cls       = "security-badge safe";
    tooltip   = "llm-valet only accepts connections from this machine. It is not reachable from other devices on your network.";
    searchUrl = null;
  }

  // Rebuild children without innerHTML — createTextNode prevents XSS if text ever includes user data
  while (el.firstChild) el.removeChild(el.firstChild);
  el.className = cls;
  el.title = tooltip;
  el.appendChild(document.createTextNode(text));

  if (searchUrl) {
    const link = document.createElement("a");
    link.href = searchUrl;
    link.target = "_blank";
    link.rel = "noopener noreferrer";
    link.textContent = " ⓘ";
    link.setAttribute("aria-label", "Learn more about this security status (opens DuckDuckGo search)");
    el.appendChild(link);
  }

  el.style.display = "block";
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderState(p, w) {
  const badge = document.getElementById("state-badge");
  const modelEl = document.getElementById("model-name");
  const lastEl = document.getElementById("last-action");

  // Clear pending action once state reaches expected outcome
  if (_pendingAction === "stopping" && !p.running) _pendingAction = null;
  if (_pendingAction === "starting" && p.running)  _pendingAction = null;
  if (_pendingAction === "restarting" && p.running) _pendingAction = null;

  let label, cls;
  if (_pendingAction === "stopping") {
    label = "STOPPING"; cls = "paused";
  } else if (_pendingAction === "starting" || _pendingAction === "restarting") {
    label = "STARTING"; cls = "paused";
  } else if (!p.running) {
    label = "STOPPED"; cls = "stopped";
  } else if (p.model_loaded) {
    label = "RUNNING"; cls = "running";
  } else if (w && w.state === "paused") {
    label = "PAUSED"; cls = "paused";   // watchdog explicitly paused
  } else {
    label = "IDLE"; cls = "idle";       // service up, no model, watchdog not paused
  }

  badge.textContent = label;
  badge.className = "badge " + cls;
  const stateTips = {
    RUNNING:   "Ollama is running and a model is loaded in memory — ready to serve requests.",
    PAUSED:    "Model has been unloaded from memory. Ollama is still running. Click RESUME to reload the model.",
    IDLE:      "Ollama is running but no model is loaded. Select a model and click LOAD, or click RESUME if one was previously loaded.",
    STOPPED:   "Ollama service is not running. Click START SVC to start it. No requests can be served.",
    STOPPING:  "Ollama is shutting down — unloading model and stopping the service.",
    STARTING:  "Ollama is starting up — waiting for the service to become ready.",
  };
  badge.title = stateTips[label] || label;
  modelEl.textContent = p.model_name ? p.model_name : "";

  if (w && w.last_reason) {
    lastEl.textContent = w.last_reason;
  }
}

function renderMetrics(m) {
  if (!m) return;

  const _ramTotal = m.memory.total_mb
    ? " of " + (m.memory.total_mb / 1024).toFixed(1) + " GB" : "";
  document.getElementById("ram-value").textContent =
    m.memory.used_pct.toFixed(1) + "%" + _ramTotal + " — " + m.memory.pressure;

  // RAM bar — split into model+other segments when model is loaded, single fill otherwise.
  // NOTE: never call setBar("ram",...) here — it looks up #ram-bar which may not exist
  // once we've switched to the segmented layout.
  const p = _lastProvider;
  const legend = document.getElementById("ram-legend");
  const track = document.getElementById("ram-bar-track");
  const hasSegments = !!track.querySelector(".bar-seg-model");

  if (p && p.model_loaded && p.memory_used_mb && m.memory.total_mb) {
    const modelPct = Math.min((p.memory_used_mb / m.memory.total_mb) * 100, 100);
    const otherPct = Math.max(m.memory.used_pct - modelPct, 0);
    if (!hasSegments) {
      track.innerHTML = "";
      const seg1 = document.createElement("div");
      seg1.className = "bar-seg-other"; seg1.id = "ram-seg-other";
      const seg2 = document.createElement("div");
      seg2.className = "bar-seg-model"; seg2.id = "ram-seg-model";
      const marker = document.createElement("div");
      marker.className = "threshold-marker"; marker.id = "ram-threshold-marker";
      marker.style.left = _thresholds.ram_pause_pct + "%";
      track.appendChild(seg1); track.appendChild(seg2); track.appendChild(marker);
    }
    document.getElementById("ram-seg-other").style.width = otherPct.toFixed(1) + "%";
    document.getElementById("ram-seg-model").style.width = modelPct.toFixed(1) + "%";
    document.getElementById("ram-threshold-marker").style.left = _thresholds.ram_pause_pct + "%";
    if (legend) {
      legend.style.display = "flex";
      const pctEl = document.getElementById("ram-legend-pct");
      if (pctEl) pctEl.textContent = "model " + p.memory_used_mb + " MB (" + modelPct.toFixed(1) + "%)";
    }
  } else {
    if (hasSegments) {
      track.innerHTML = "";
      const fill = document.createElement("div");
      fill.className = "bar-fill"; fill.id = "ram-bar";
      const marker = document.createElement("div");
      marker.className = "threshold-marker"; marker.id = "ram-threshold-marker";
      marker.style.left = _thresholds.ram_pause_pct + "%";
      track.appendChild(fill); track.appendChild(marker);
    }
    // #ram-bar is guaranteed to exist here
    const fill = document.getElementById("ram-bar");
    const pct = m.memory.used_pct;
    fill.style.width = pct.toFixed(1) + "%";
    fill.className = "bar-fill" + (pct >= _thresholds.ram_pause_pct ? " critical"
                                 : pct >= _thresholds.ram_pause_pct * 0.85 ? " warn" : "");
    document.getElementById("ram-threshold-marker").style.left = _thresholds.ram_pause_pct + "%";
    if (legend) legend.style.display = "none";
  }

  setBar("cpu", m.cpu.used_pct, _thresholds.cpu_pause_pct);
  document.getElementById("cpu-value").textContent = m.cpu.used_pct.toFixed(1) + "%";

  if (m.gpu.available && m.gpu.vram_used_pct !== null) {
    document.getElementById("gpu-metric").style.display = "";
    setBar("gpu", m.gpu.vram_used_pct, _thresholds.gpu_vram_pause_pct);
    document.getElementById("gpu-value").textContent =
      m.gpu.vram_used_pct.toFixed(1) + "% (" +
      (m.gpu.vram_used_mb || "?") + " / " +
      (m.gpu.vram_total_mb || "?") + " MB)";
  } else {
    document.getElementById("gpu-metric").style.display = "none";
  }
}

function setBar(id, pct, threshold) {
  const fill   = document.getElementById(id + "-bar");
  const marker = document.getElementById(id + "-threshold-marker");

  fill.style.width = Math.min(Math.max(pct, 0), 100) + "%";

  if (pct >= threshold) {
    fill.className = "bar-fill critical";
  } else if (pct >= threshold * 0.85) {
    fill.className = "bar-fill warn";
  } else {
    fill.className = "bar-fill";
  }

  if (marker) marker.style.left = threshold + "%";
}

// ── Provider section ──────────────────────────────────────────────────────────

function renderProvider(p) {
  const modelEl  = document.getElementById("pv-model");
  const memEl    = document.getElementById("pv-mem");
  const ctxEl    = document.getElementById("pv-ctx");
  const ratioEl  = document.getElementById("layer-ratio");

  // Endpoint + connectivity status
  const epEl   = document.getElementById("pv-endpoint");
  const dotEl  = document.getElementById("pv-status-dot");
  const txtEl  = document.getElementById("pv-status-text");
  if (p.endpoint) {
    epEl.textContent = p.endpoint;
    epEl.title = "The URL llm-valet uses to communicate with Ollama. Configured via ollama_url in config.yaml.";
  }
  const up = p.running;
  dotEl.className = "pv-status-dot " + (up ? "up" : "down");
  dotEl.title = up ? "Ollama is reachable and responding at this endpoint." : "Ollama is not responding at this endpoint. The service may be stopped or starting up.";
  txtEl.textContent = up ? "Listening" : "Offline";
  txtEl.className   = up ? "up" : "down";

  const providerBadge = document.getElementById("provider-badge");
  if (providerBadge) providerBadge.title = "Active LLM provider. Currently Ollama. Additional providers (LM Studio, vLLM) are planned for future releases.";

  modelEl.textContent = p.model_loaded ? (p.model_name || "unknown") : "none";
  memEl.textContent   = p.memory_used_mb ? p.memory_used_mb + " MB" : "—";

  // Context: prefer live loaded_context_length from /api/ps (actual active window)
  if (p.model_loaded && p.loaded_context_length) {
    ctxEl.textContent = _fmtCtx(p.loaded_context_length);
  } else {
    ctxEl.textContent = "—";
  }

  // CPU/GPU layer memory ratio + % split
  if (p.model_loaded && p.memory_used_mb && p.size_vram_mb != null) {
    const gpuMB  = p.size_vram_mb;
    const cpuMB  = p.memory_used_mb - gpuMB;
    const gpuPct = Math.round((gpuMB / p.memory_used_mb) * 100);
    const cpuPct = 100 - gpuPct;
    ratioEl.textContent =
      "Layers — CPU: " + cpuMB + " MB (" + cpuPct + "%) · GPU: " + gpuMB + " MB (" + gpuPct + "%)";
  } else if (p.model_loaded && p.memory_used_mb) {
    ratioEl.textContent = "Layers — CPU: " + p.memory_used_mb + " MB · GPU: — MB";
  } else {
    ratioEl.textContent = "";
  }

  // Over-commit warning — model's actual memory (from Ollama /api/ps) exceeds the RAM
  // pause threshold, meaning psutil-based auto-pause won't trigger.  Show amber warning.
  const ocEl = document.getElementById("overcommit-warn");
  if (ocEl) {
    if (p.overcommit && p.memory_used_mb) {
      const mb  = p.memory_used_mb;
      const str = mb >= 1024 ? (mb / 1024).toFixed(1) + " GB" : mb + " MB";
      ocEl.textContent = "⚠ Model (" + str + ") exceeds RAM pause threshold — watchdog auto-pause won't trigger. Performance may be degraded. Use PAUSE manually when needed.";
      ocEl.style.display = "block";
    } else {
      ocEl.style.display = "none";
    }
  }

  // Sync model dropdown to currently loaded model — but only when the user hasn't made
  // a pending selection. _modelSelectDirty blocks the overwrite while a choice is in
  // flight so the user doesn't race against the poll interval.
  const sel = document.getElementById("model-select");
  if (!_modelSelectDirty && p.model_loaded && p.model_name) {
    for (const opt of sel.options) {
      if (opt.value === p.model_name) {
        if (sel.value !== p.model_name) {
          sel.value = p.model_name;
          onModelSelectChange();
        }
        break;
      }
    }
  }
  updateLoadButton();
}

function _fmtCtx(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + "M ctx";
  if (n >= 1024)    return Math.round(n / 1024) + "K ctx";  // 1024 not 1000 — ctx lengths are powers of 2
  return n + " ctx";
}

// ── Context window selector ───────────────────────────────────────────────────

// Common context sizes to offer as options. Filtered to ≤ model's max at render time.
const _CTX_OPTIONS = [512, 1024, 2048, 4096, 8192, 16384, 32768, 65536, 131072];

function _fmtCtxLabel(n) {
  if (n >= 131072) return "128K tokens";
  if (n >= 65536)  return "64K tokens";
  if (n >= 32768)  return "32K tokens";
  if (n >= 16384)  return "16K tokens";
  if (n >= 8192)   return "8K tokens";
  if (n >= 4096)   return "4K tokens";
  if (n >= 2048)   return "2K tokens";
  if (n >= 1024)   return "1K tokens";
  return n + " tokens";
}

function updateLoadButton() {
  const btn      = document.getElementById("btn-load");
  const modelSel = document.getElementById("model-select");
  const ctxSel   = document.getElementById("ctx-select");
  if (!btn) return;

  const selectedModel = modelSel ? modelSel.value : "";
  const selectedCtx   = ctxSel && ctxSel.value ? parseInt(ctxSel.value, 10) : null;
  const loadedModel   = _lastProvider && _lastProvider.model_loaded ? _lastProvider.model_name : null;
  const loadedCtx     = _lastProvider ? _lastProvider.loaded_context_length : null;

  if (loadedModel && selectedModel === loadedModel) {
    if (selectedCtx && selectedCtx !== loadedCtx) {
      btn.textContent = "RELOAD \u00b7 " + _fmtCtxLabel(selectedCtx);  // RELOAD · 4K tokens
    } else {
      btn.textContent = "RELOAD";
    }
  } else {
    btn.textContent = "LOAD";
  }
}

function onModelSelectChange() {
  _modelSelectDirty = true;  // user has made a manual selection — block poll sync until LOAD is acted on
  const sel = document.getElementById("model-select");
  const ctxRow = document.getElementById("ctx-select-row");
  const ctxSel = document.getElementById("ctx-select");
  const name = sel.value;
  const meta = name ? _modelMeta[name] : null;
  const maxCtx = meta && meta.context_length ? meta.context_length : null;

  // Rebuild ctx options
  while (ctxSel.options.length > 1) ctxSel.remove(1);

  if (maxCtx) {
    for (const size of _CTX_OPTIONS) {
      if (size > maxCtx) break;
      const opt = document.createElement("option");
      opt.value = size;
      const suffix = size === maxCtx ? " (model max)" : "";
      opt.textContent = _fmtCtxLabel(size) + suffix;
      ctxSel.appendChild(opt);
    }
    // If model max isn't a standard option, add it explicitly
    if (!_CTX_OPTIONS.includes(maxCtx)) {
      const opt = document.createElement("option");
      opt.value = maxCtx;
      opt.textContent = _fmtCtxLabel(maxCtx) + " (model max)";
      ctxSel.appendChild(opt);
    }
    ctxRow.style.display = "flex";
  } else {
    // Max unknown — no useful options to show; hide the row
    ctxRow.style.display = "none";
  }
  updateLoadButton();
}

async function loadModels() {
  try {
    const r = await apiFetch("/models");
    if (!r.ok) return;
    const data = await r.json();
    const sel = document.getElementById("model-select");
    const prev = sel.value;
    while (sel.options.length > 1) sel.remove(1);
    _modelMeta = {};
    for (const m of (data.models || [])) {
      _modelMeta[m.name] = { size_mb: m.size_mb, context_length: m.context_length };
      const opt = document.createElement("option");
      opt.value = m.name;
      const mb  = m.size_mb ? m.size_mb + " MB" : "";
      const ctx = m.context_length ? _fmtCtx(m.context_length) + " max ctx" : "";
      const meta = [mb, ctx].filter(Boolean).join(" · ");
      opt.textContent = m.name + (meta ? "  (" + meta + ")" : "");
      sel.appendChild(opt);
    }
    if (prev) sel.value = prev;
    // If no prior selection, pre-select the currently loaded model from the
    // last poll result.  This covers two cases:
    //   (a) loadModels() runs after poll() — e.g. post-START setTimeout refresh
    //   (b) hard refresh where _lastProvider is populated before loadModels()
    // On very first page load _lastProvider is null here, so renderProvider()
    // handles the initial sync on the first poll tick.
    if (!sel.value && _lastProvider && _lastProvider.model_loaded && _lastProvider.model_name) {
      for (const opt of sel.options) {
        if (opt.value === _lastProvider.model_name) { sel.value = opt.value; break; }
      }
    }
    onModelSelectChange();  // re-init ctx row whenever model list refreshes
    // loadModels() is a system refresh, not a user selection — clear the dirty
    // flag so renderProvider() can still sync the dropdown on the next poll.
    _modelSelectDirty = false;
    renderMgmtList(data.models || []);
  } catch (_) { /* non-fatal */ }
}

async function loadModel() {
  const sel = document.getElementById("model-select");
  const name = sel.value;
  if (!name) return;
  const btn = document.getElementById("btn-load");
  const statusEl = document.getElementById("load-status");
  btn.disabled = true;

  const ctxSelEl = document.getElementById("ctx-select");
  const rawCtx = ctxSelEl ? ctxSelEl.value : "";
  const numCtx = rawCtx ? parseInt(rawCtx, 10) : null;
  const ctxNote = numCtx ? " (" + _fmtCtxLabel(numCtx) + " ctx)" : "";
  statusEl.textContent = "Loading " + name + ctxNote + "...";

  const payload = { model: name };
  if (numCtx) payload.num_ctx = numCtx;

  try {
    const r = await apiFetch("/load", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const data = await r.json();
    statusEl.textContent = data.ok ? name + " loaded" + ctxNote : "load failed";
    await poll();
  } catch (e) {
    statusEl.textContent = "error: " + e.message;
  } finally {
    btn.disabled = false;
    _modelSelectDirty = false;  // LOAD complete — allow poll to sync model dropdown again
    updateLoadButton();
  }
}

// ── Model management panel ────────────────────────────────────────────────────

function toggleMgmt() {
  const header = document.getElementById("mgmt-header");
  const body   = document.getElementById("mgmt-body");
  header.classList.toggle("open");
  body.classList.toggle("open");
}

function renderMgmtList(models) {
  const container = document.getElementById("mgmt-model-list");
  container.textContent = "";   // clear — textContent, not innerHTML

  if (!models.length) {
    const el = document.createElement("div");
    el.style.cssText = "color:var(--dim);font-size:11px";
    el.textContent = "No models installed";
    container.appendChild(el);
    return;
  }

  for (const m of models) {
    const row = document.createElement("div");
    row.className = "model-row";

    const info = document.createElement("div");
    const nameSpan = document.createElement("div");
    nameSpan.textContent = m.name;
    const metaSpan = document.createElement("div");
    metaSpan.className = "model-info";
    const mb  = m.size_mb ? m.size_mb + " MB" : "";
    const ctx = m.context_length ? _fmtCtx(m.context_length) + " max ctx" : "";
    metaSpan.textContent = [mb, ctx].filter(Boolean).join(" · ");
    info.appendChild(nameSpan);
    info.appendChild(metaSpan);

    const btn = document.createElement("button");
    btn.className = "btn-sm";
    btn.textContent = "RM";
    // Capture model name in closure via dataset — no inline script
    btn.dataset.model = m.name;
    btn.addEventListener("click", function() {
      deleteModel(this.dataset.model);
    });

    row.appendChild(info);
    row.appendChild(btn);
    container.appendChild(row);
  }
}

async function deleteModel(name) {
  if (!confirm("Delete model " + name + " from local storage? This cannot be undone.")) return;
  try {
    const r = await apiFetch("/models/" + encodeURIComponent(name), { method: "DELETE" });
    const data = await r.json();
    if (data.ok) {
      await loadModels();
    } else {
      alert("Delete failed for " + name);
    }
  } catch (e) {
    alert("Delete error: " + e.message);
  }
}

async function pullModel() {
  const input  = document.getElementById("pull-input");
  const statusEl = document.getElementById("pull-status");
  const name = input.value.trim();
  if (!name) return;
  if (!confirm("Pull model " + name + "? This may take several minutes.")) return;

  statusEl.textContent = "Pulling " + name + "... (check logs for progress)";
  input.disabled = true;
  try {
    const r = await apiFetch("/models/pull", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: name }),
    });
    const data = await r.json();
    statusEl.textContent = data.ok ? name + " pull complete" : "pull failed";
    if (data.ok) {
      input.value = "";
      await loadModels();
    }
  } catch (e) {
    statusEl.textContent = "pull error: " + e.message;
  } finally {
    input.disabled = false;
  }
}

// ── Actions ───────────────────────────────────────────────────────────────────

async function action(name) {
  // Track async operations so the badge shows a transitioning state while polling
  if (name === "stop")    _pendingAction = "stopping";
  if (name === "start")   _pendingAction = "starting";
  if (name === "restart") _pendingAction = "restarting";

  setButtonsDisabled(true);
  const lastEl = document.getElementById("last-action");
  lastEl.textContent = name.toUpperCase() + "...";
  try {
    const r = await apiFetch("/" + name, { method: "POST" });
    const data = await r.json();
    lastEl.textContent = name.toUpperCase() + (data.ok ? " — ok" : " — failed");
    await poll();
  } catch (e) {
    _pendingAction = null;
    lastEl.textContent = name.toUpperCase() + " — error: " + e.message;
  } finally {
    // Re-enable buttons based on last known state; fallback to all-on if unknown
    renderControls(_lastProvider, _lastWatchdog);
  }
}

function setButtonsDisabled(disabled) {
  ["pause","resume","start","stop","restart"].forEach(id => {
    const el = document.getElementById("btn-" + id);
    if (el) el.disabled = disabled;
  });
}

function renderControls(p, w) {
  // If state is unknown (startup / error), re-enable everything
  if (!p) { setButtonsDisabled(false); return; }

  const running = p.running;
  const loaded  = p.model_loaded;
  const wState  = w ? w.state : "running";

  // PAUSE: only useful when a model is loaded
  const pauseEl = document.getElementById("btn-pause");
  if (pauseEl) pauseEl.disabled = !running || !loaded;

  // RESUME: only useful when watchdog is paused (restores model)
  const resumeEl = document.getElementById("btn-resume");
  if (resumeEl) resumeEl.disabled = !running || wState !== "paused";

  // START: only when service is down
  const startEl = document.getElementById("btn-start");
  if (startEl) startEl.disabled = running;

  // STOP / RESTART: only when service is up
  const stopEl = document.getElementById("btn-stop");
  if (stopEl) stopEl.disabled = !running;

  const restartEl = document.getElementById("btn-restart");
  if (restartEl) restartEl.disabled = !running;
}

// ── Config ────────────────────────────────────────────────────────────────────

function initSliderDragTracking() {
  // Mark a slider as being dragged on input; clear on change (release).
  // setSlider() skips updates for any slider in _draggingSliders so a poll
  // tick mid-drag doesn't snap the thumb back.
  ["sl-ram-pause", "sl-ram-resume", "sl-cpu-pause", "sl-gpu-pause", "sl-refresh"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener("input",  () => _draggingSliders.add(id));
    el.addEventListener("change", () => _draggingSliders.delete(id));
  });
}

function syncConfigSliders(cfg) {
  // Skip sync while a PUT is in flight — prevents poll from overwriting a slider
  // in the gap between the user releasing and the server acknowledging the write.
  if (_savingConfig) return;
  // Called on every poll tick. setSlider is a no-op for sliders currently dragged.
  setSlider("sl-ram-pause",  "lbl-ram-pause",  cfg.ram_pause_pct      ?? _thresholds.ram_pause_pct);
  setSlider("sl-ram-resume", "lbl-ram-resume", cfg.ram_resume_pct     ?? 60);
  setSlider("sl-cpu-pause",  "lbl-cpu-pause",  cfg.cpu_pause_pct      ?? _thresholds.cpu_pause_pct);
  setSlider("sl-gpu-pause",  "lbl-gpu-pause",  cfg.gpu_vram_pause_pct ?? _thresholds.gpu_vram_pause_pct);
  _thresholds.ram_pause_pct      = cfg.ram_pause_pct      ?? _thresholds.ram_pause_pct;
  _thresholds.cpu_pause_pct      = cfg.cpu_pause_pct      ?? _thresholds.cpu_pause_pct;
  _thresholds.gpu_vram_pause_pct = cfg.gpu_vram_pause_pct ?? _thresholds.gpu_vram_pause_pct;
  const cb = document.getElementById("cb-auto-resume");
  if (cb) cb.checked = cfg.auto_resume_on_ram_pressure ?? true;
}

async function loadConfig() {
  try {
    const r = await apiFetch("/config");
    if (!r.ok) return;
    const cfg = await r.json();
    _thresholds.ram_pause_pct      = cfg.ram_pause_pct      ?? 85;
    _thresholds.cpu_pause_pct      = cfg.cpu_pause_pct      ?? 90;
    _thresholds.gpu_vram_pause_pct = cfg.gpu_vram_pause_pct ?? 85;

    setSlider("sl-ram-pause",  "lbl-ram-pause",  _thresholds.ram_pause_pct);
    setSlider("sl-ram-resume", "lbl-ram-resume", cfg.ram_resume_pct ?? 60);
    setSlider("sl-cpu-pause",  "lbl-cpu-pause",  _thresholds.cpu_pause_pct);
    setSlider("sl-gpu-pause",  "lbl-gpu-pause",  _thresholds.gpu_vram_pause_pct);

    const cb = document.getElementById("cb-auto-resume");
    if (cb) cb.checked = cfg.auto_resume_on_ram_pressure ?? true;
  } catch (_) { /* ignore — defaults stand */ }
}

function setSlider(sliderId, labelId, value) {
  if (_draggingSliders.has(sliderId)) return;  // don't override while user is mid-drag
  const el  = document.getElementById(sliderId);
  const lbl = document.getElementById(labelId);
  if (el)  el.value = value;
  if (lbl) lbl.textContent = value + "%";
}

async function saveThresholds() {
  const cb = document.getElementById("cb-auto-resume");
  const body = {
    ram_pause_pct:              parseFloat(document.getElementById("sl-ram-pause").value),
    ram_resume_pct:             parseFloat(document.getElementById("sl-ram-resume").value),
    cpu_pause_pct:              parseFloat(document.getElementById("sl-cpu-pause").value),
    gpu_vram_pause_pct:         parseFloat(document.getElementById("sl-gpu-pause").value),
    auto_resume_on_ram_pressure: cb ? cb.checked : true,
  };
  _thresholds.ram_pause_pct      = body.ram_pause_pct;
  _thresholds.cpu_pause_pct      = body.cpu_pause_pct;
  _thresholds.gpu_vram_pause_pct = body.gpu_vram_pause_pct;

  // Hold the write-lock for the duration of the PUT so a poll tick mid-flight
  // cannot overwrite the slider with the server's stale value.
  _savingConfig = true;
  try {
    await apiFetch("/config", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
  } catch (_) { /* non-fatal */ }
  finally { _savingConfig = false; }
}

function updateLabel(id, value, suffix) {
  const el = document.getElementById(id);
  if (el) el.textContent = value + suffix;
}

// ── Error banner ──────────────────────────────────────────────────────────────

function showError(msg) {
  const el = document.getElementById("error-banner");
  el.textContent = msg;   // textContent — never innerHTML
  el.style.display = "block";
}

function hideError() {
  document.getElementById("error-banner").style.display = "none";
}

// ── Init ──────────────────────────────────────────────────────────────────────

initTheme();
boot();
</script>
